:root {
  --gold:   #ffbb00;
  --name:   rgba(255,255,255,0.72);
  --green:  #00ff55;
  --red:    #ff5500;
  --dim:    #444;
  --hdr:    #ffffff;
  --line:   rgba(255,255,255,0.07);
  --f: 'D7', monospace;
  --glow-gold:  0 0 8px rgba(255,170,0,0.55),  0 0 2px rgba(255,170,0,0.9);
  --glow-green: 0 0 8px rgba(0,255,85,0.55),   0 0 2px rgba(0,255,85,0.9);
  --glow-red:   0 0 10px rgba(255,85,0,0.75),  0 0 3px rgba(255,85,0,1.0);
  --glow-white: 0 0 6px rgba(255,255,255,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background-color:#050505;font-family:var(--f);}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.board{position:relative;width:906px;height:76vh;background-color:#060606;display:flex;flex-direction:column;overflow:hidden;}
.ticker-bar{flex-shrink:0;height:57px;background:rgba(4,4,4,0.94);border-bottom:1px solid var(--line);display:flex;align-items:center;overflow:hidden;position:relative;z-index:2;}
.ticker-logo{font-family:var(--f);font-size:26px;letter-spacing:0.22em;color:#ff2200;text-shadow:none;padding:0 22px;border-right:1px solid var(--line);height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;}
.ticker-scroll-wrap{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;}
.ticker-track{display:inline-flex;white-space:nowrap;animation:ticker-scroll 500s linear infinite;}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{font-family:var(--f);font-size:20px;letter-spacing:0.07em;padding:0 20px;border-right:1px solid rgba(255,255,255,0.03);white-space:nowrap;}
.col-headers{flex-shrink:0;height:34px;background:rgba(4,4,4,0.97);border-bottom:1px solid rgba(255,255,255,0.16);display:grid;grid-template-columns:56px 308px 80px 210px 130px 82px;align-items:center;padding:0 20px;position:relative;z-index:2;}
.col-lbl{font-family:var(--f);font-size:14px;letter-spacing:0.22em;color:#ffffff;text-transform:uppercase;white-space:nowrap;overflow:visible;}
.table-scroll{flex:1;overflow:hidden;position:relative;z-index:2;}
.table-inner{position:absolute;top:0;left:0;right:0;}
.mrow{display:grid;grid-template-columns:56px 308px 80px 210px 130px 82px;align-items:center;height:29px;padding:0 20px;}

.c{font-family:var(--f);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-rank{font-size:17px;color:#ffffff;letter-spacing:0.12em;}
.c-name{font-size:22px;letter-spacing:0.08em;text-transform:uppercase;color:#ff2200;text-shadow:none;padding-right:8px;}
.c-unit{font-size:17px;color:#ffffff;letter-spacing:0.14em;text-transform:uppercase;}
.c-price{font-size:26px;color:#ffbb00;text-shadow:none;letter-spacing:0.03em;}
.c-trend{font-size:23px;letter-spacing:0.04em;}
.c-trend.up{color:#00ff55;text-shadow:none;}
.c-trend.dn{color:#ffffff;text-shadow:none;}
.c-trend.flat{color:#ffbb00;text-shadow:none;}
.c-arrow{font-size:18px;}
.c-arrow.up{color:#00ff55;text-shadow:none;}
.c-arrow.dn{color:#ff2200;text-shadow:none;}
.c-arrow.flat{color:rgba(255,255,255,0.20);}
.status-bar{flex-shrink:0;height:42px;background:rgba(3,3,3,0.96);border-top:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:14px;overflow:hidden;position:relative;z-index:2;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff2200;box-shadow:none;display:inline-block;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.12}}
.slbl{font-family:var(--f);font-size:16px;letter-spacing:0.16em;color:rgba(255,255,255,0.28);text-transform:uppercase;white-space:nowrap;}
</style>

let state=A.map(a=>({...a,change:0,trend:"flat"}));
function fmt(v){if(v>=1e9)return`$${(v/1e9).toFixed(3)}B`;if(v>=1e6)return`$${(v/1e6).toFixed(3)}M`;if(v>=1e3)return`$${(v/1e3).toFixed(2)}k`;return`$${v.toFixed(2)}`;}
function vol(u){return u==="g"?2.2:u==="kg"?1.4:0.9;}
function tickPrices(){state=state.map(a=>{const b=vol(a.unit),r=Math.random();const mag=r<0.70?b:r<0.90?b*3:r<0.98?b*7:b*16;const chg=(Math.random()-0.5)*mag;return{...a,value:+Math.max(0.01,a.value*(1+chg/100)).toFixed(2),change:+chg.toFixed(2),trend:chg>0?"up":chg<0?"dn":"flat"};});}
const tEl=document.getElementById("table-inner");
const pm=new Map();
function renderTable(){state.forEach((a,i)=>{const pv=pm.get(a.id);let row=document.getElementById(`row-${a.id}`);if(!row){row=document.createElement("div");row.className="mrow";row.id=`row-${a.id}`;tEl.appendChild(row);}const tc=a.trend;const ar=tc==="up"?"▲":tc==="dn"?"▼":"■";const sg=a.change>0?"+":"";row.innerHTML=`<div class="c c-rank">${String(i+1).padStart(3,"0")}</div><div class="c c-name">${a.name}</div><div class="c c-unit">${a.unit}</div><div class="c c-price">${fmt(a.value)}</div><div class="c c-trend ${tc}">${sg}${Math.abs(a.change).toFixed(2)}%</div><div class="c c-arrow ${tc}">${ar}</div>`;if(pv!==undefined&&pv!==a.value){row.classList.remove("flash-up","flash-down");void row.offsetWidth;}pm.set(a.id,a.value);});}
function buildTicker(){const track=document.getElementById("ticker-track");const items=[...state,...state];track.innerHTML=items.map(a=>{const col=a.trend==="up"?"#00ff55":a.trend==="dn"?"#ff5500":"#ffaa00";return`<div class="ticker-item"><span style="color:rgba(255,255,255,0.72);margin-right:10px">${a.name.toUpperCase()}</span><span style="color:${col};text-shadow:0 0 6px ${col}">${fmt(a.value)}/${a.unit}</span></div>`;}).join("");}
let sp=0,sd=1;
function autoScroll(){const wrap=document.querySelector(".table-scroll");if(!wrap){requestAnimationFrame(autoScroll);return;}const max=tEl.scrollHeight-wrap.clientHeight;if(max>0){sp+=0.3*sd;if(sp>=max){sd=-1;sp=max;}if(sp<=0){sd=1;sp=0;}wrap.scrollTop=sp;}requestAnimationFrame(autoScroll);}
function clockFn(){const n=new Date();document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0");}
renderTable();buildTicker();requestAnimationFrame(autoScroll);setInterval(clockFn,1000);clockFn();setInterval(()=>{tickPrices();renderTable();buildTicker();},2500);
