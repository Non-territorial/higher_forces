<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAI UEIT</title>
<style>

/* ── Font: URL-encoded filename with space & parens ── */
@font-face {
  font-family: 'D7';
  src: url('/fonts/digital-7%20%28mono%20italic%29.ttf') format('truetype'),
       url('/fonts/digital-7 (mono italic).ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

:root {
  --gold:  #c8a84b;
  --green: #00cc66;
  --red:   #cc2200;
  --dim:   #505050;
  --line:  rgba(255,255,255,0.08);
  --f: 'D7', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background-color: #050505;
  background-image: radial-gradient(
    ellipse 1px 1px at 1.5px 1.5px,
    rgba(255,255,255,0.045) 40%, transparent 40%
  );
  background-size: 3px 3px;
  font-family: var(--f);
}

/* ── STAGE: centres the board ─────────────────────── */
.stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}

/* ── BOARD: contained panel, no corner marks ─────── */
.board {
  position: relative;
  width:  68vw;
  height: 62vh;
  background-color: #060606;
  background-image: radial-gradient(
    ellipse 1.1px 1.1px at 1.5px 1.5px,
    rgba(255,255,255,0.06) 40%, transparent 40%
  );
  background-size: 3px 3px;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── TICKER ───────────────────────────────────────── */
.ticker-bar {
  position: relative; z-index: 2;
  flex-shrink: 0; height: 40px;
  background: rgba(4,4,4,0.92);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; overflow: hidden;
}
.ticker-logo {
  font-family: var(--f); font-size: 18px;
  letter-spacing: 0.20em; color: var(--gold);
  padding: 0 20px; border-right: 1px solid var(--line);
  height: 100%; display: flex; align-items: center;
  white-space: nowrap; flex-shrink: 0;
}
.ticker-scroll-wrap { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
.ticker-track {
  display: inline-flex; white-space: nowrap;
  animation: ticker-scroll 200s linear infinite;
}
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  font-family: var(--f); font-size: 14px; letter-spacing: 0.06em;
  padding: 0 18px; border-right: 1px solid rgba(255,255,255,0.03);
  white-space: nowrap;
}

/* ── COLUMN HEADERS ───────────────────────────────── */
.col-headers {
  position: relative; z-index: 2;
  flex-shrink: 0; height: 24px;
  background: rgba(4,4,4,0.96);
  border-bottom: 1px solid rgba(255,255,255,0.15);
  display: grid;
  grid-template-columns: 50px 1fr 62px 170px 100px 52px;
  align-items: center; padding: 0 16px;
}
.col-lbl {
  font-family: var(--f); font-size: 10px;
  letter-spacing: 0.20em; color: rgba(255,255,255,0.22);
  text-transform: uppercase;
}

/* ── TABLE ────────────────────────────────────────── */
.table-scroll { position: relative; z-index: 2; flex: 1; overflow: hidden; }
.table-inner  { position: absolute; top: 0; left: 0; right: 0; }

.mrow {
  display: grid;
  grid-template-columns: 50px 1fr 62px 170px 100px 52px;
  align-items: center;
  height: 18px; padding: 0 16px;
  transition: background 0.18s;
}
.mrow.flash-up   { animation: f-up   0.7s ease-out forwards; }
.mrow.flash-down { animation: f-down 0.7s ease-out forwards; }
@keyframes f-up   { 0%{background:rgba(0,204,102,0.18)} 100%{background:transparent} }
@keyframes f-down { 0%{background:rgba(204,34,0,0.14)}  100%{background:transparent} }

.c      { font-family:var(--f); font-size:15px; letter-spacing:0.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.c-rank { font-size:11px; color:rgba(255,255,255,0.20); letter-spacing:0.12em; }
.c-name { font-size:14px; letter-spacing:0.07em; text-transform:uppercase; color:rgba(255,255,255,0.50); padding-right:6px; }
.c-unit { font-size:11px; color:var(--dim); letter-spacing:0.14em; text-transform:uppercase; }
.c-price{ font-size:16px; color:var(--gold); letter-spacing:0.03em; }
.c-trend{ font-size:14px; letter-spacing:0.04em; }
.c-trend.up   { color:var(--green); }
.c-trend.dn   { color:var(--red);   }
.c-trend.flat { color:var(--gold);  }
.c-arrow{ font-size:12px; }
.c-arrow.up { color:var(--green); }
.c-arrow.dn { color:var(--red);   }
.c-arrow.fl { color:rgba(255,255,255,0.14); }

/* ── STATUS BAR ───────────────────────────────────── */
.status-bar {
  position: relative; z-index: 2;
  flex-shrink: 0; height: 28px;
  background: rgba(3,3,3,0.94);
  border-top: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 18px; gap: 12px; overflow: hidden;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); display: inline-block;
  animation: pulse 1.2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.10} }
.slbl {
  font-family:var(--f); font-size:11px;
  letter-spacing:0.16em; color:rgba(255,255,255,0.26);
  text-transform:uppercase; white-space:nowrap;
}

/* ════════════════════════════════════════════════════
   CURTAINS — FULLSCREEN, fixed to the viewport.
   Left panel covers left half of screen, slides LEFT.
   Right panel covers right half, slides RIGHT.
   60 s cycle: 0–20 open | 20–40 hold | 40–60 close
   ════════════════════════════════════════════════════ */
.curtain-l,
.curtain-r {
  position: fixed;
  top: 0; bottom: 0;
  z-index: 999;
  width: 50%;
  background: #000;
  background-image: repeating-linear-gradient(
    0deg,
    transparent 0px 3px,
    rgba(255,255,255,0.008) 3px 4px
  );
}
.curtain-l {
  left: 0;
  transform-origin: left center;
  animation: c-left  60s cubic-bezier(0.45,0,0.55,1) forwards;
}
.curtain-r {
  right: 0;
  transform-origin: right center;
  animation: c-right 60s cubic-bezier(0.45,0,0.55,1) forwards;
}

@keyframes c-left {
  0%     { transform: scaleX(1); }
  33.33% { transform: scaleX(0); }
  66.66% { transform: scaleX(0); }
  100%   { transform: scaleX(1); }
}
@keyframes c-right {
  0%     { transform: scaleX(1); }
  33.33% { transform: scaleX(0); }
  66.66% { transform: scaleX(0); }
  100%   { transform: scaleX(1); }
}

/* centre seam — hides the hairline gap between panels */
.curtain-seam {
  position: fixed;
  top: 0; bottom: 0; z-index: 998;
  left: calc(50% - 1px); width: 2px;
  background: #000;
  animation: seam-fade 60s cubic-bezier(0.45,0,0.55,1) forwards;
}
@keyframes seam-fade {
  0%     { opacity: 1; }
  33.33% { opacity: 0; }
  66.66% { opacity: 0; }
  100%   { opacity: 1; }
}

</style>
</head>
<body>

<div class="stage">
  <div class="board">

    <div class="ticker-bar">
      <div class="ticker-logo">BAI UEIT</div>
      <div class="ticker-scroll-wrap">
        <div class="ticker-track" id="ticker-track"></div>
      </div>
    </div>

    <div class="col-headers">
      <div class="col-lbl">No#</div>

      <div class="col-lbl">Unit</div>
      <div class="col-lbl">$ / Unit</div>

    </div>

    <div class="table-scroll">
      <div class="table-inner" id="table-inner"></div>
    </div>

    <div class="status-bar">
      <span class="live-dot"></span>

<div class="curtain-l"></div>

let state=ARTISTS.map(a=>({...a}));

function fmt(v){
  if(v>=1e9)return`$${(v/1e9).toFixed(3)}B`;
  if(v>=1e6)return`$${(v/1e6).toFixed(3)}M`;
  if(v>=1e3)return`$${(v/1e3).toFixed(2)}k`;
  return`$${v.toFixed(2)}`;
}
function vol(u){return u==="g"?2.2:u==="kg"?1.4:0.9;}
function tickPrices(){
  state=state.map(a=>{
    const b=vol(a.unit),r=Math.random();
    const mag=r<0.70?b:r<0.90?b*3:r<0.98?b*7:b*16;
    const chg=(Math.random()-0.5)*mag;
    return{...a,value:+Math.max(0.01,a.value*(1+chg/100)).toFixed(2),change:+chg.toFixed(2),trend:chg>=0?"up":"down"};
  });
}

const tableEl=document.getElementById("table-inner");
const prevMap=new Map();

function renderTable(){
  state.forEach((a,i)=>{
    const pv=prevMap.get(a.id);
    let row=document.getElementById(`row-${a.id}`);
    if(!row){row=document.createElement("div");row.className="mrow";row.id=`row-${a.id}`;tableEl.appendChild(row);}
    const tc=a.change>0?"up":a.change<0?"dn":"flat";
    const ar=a.change>0?"▲":a.change<0?"▼":"■";
    const sg=a.change>0?"+":"";
    row.innerHTML=`
      <div class="c c-rank">${String(i+1).padStart(3,"0")}</div>
      <div class="c c-name">${a.name}</div>
      <div class="c c-unit">${a.unit}</div>
      <div class="c c-price">${fmt(a.value)}</div>
      <div class="c c-trend ${tc}">${sg}${Math.abs(a.change).toFixed(2)}%</div>
      <div class="c c-arrow ${tc==="up"?"up":tc==="dn"?"dn":"fl"}">${ar}</div>`;
    if(pv!==undefined&&pv!==a.value){
      row.classList.remove("flash-up","flash-down");
      void row.offsetWidth;
      row.classList.add(a.change>0?"flash-up":"flash-down");
      setTimeout(()=>row.classList.remove("flash-up","flash-down"),750);
    }
    prevMap.set(a.id,a.value);
  });
}

function buildTicker(){
  const track=document.getElementById("ticker-track");
  const items=[...state,...state];
  track.innerHTML=items.map(a=>`
    <div class="ticker-item">
      <span style="color:rgba(255,255,255,0.76);margin-right:8px">${a.name.toUpperCase()}</span>
      <span style="color:${a.trend==="up"?"#00cc66":a.trend==="down"?"#cc2200":"#c8a84b"}">${fmt(a.value)}/${a.unit}</span>
    </div>`).join("");
}

let sp=0,sd=1;
function autoScroll(){
  const wrap=document.querySelector(".table-scroll");
  if(!wrap){requestAnimationFrame(autoScroll);return;}
  const max=tableEl.scrollHeight-wrap.clientHeight;
  if(max>0){sp+=0.28*sd;if(sp>=max){sd=-1;sp=max;}if(sp<=0){sd=1;sp=0;}wrap.scrollTop=sp;}
  requestAnimationFrame(autoScroll);
}

function clockFn(){
  const n=new Date();
  document.getElementById("clock").textContent=
    String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0");
}

renderTable();buildTicker();
requestAnimationFrame(autoScroll);
setInterval(clockFn,1000);clockFn();
setInterval(()=>{tickPrices();renderTable();buildTicker();},2500);
</script>
